# G6: Production Hygiene - Structured JSON Logs
log_format json_combined escape=json
  '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status": "$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_time":"$request_time"'
  '}';

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # JSON formattaki logları kullan
    access_log /var/log/nginx/access.log json_combined;

    # Gzip Compression (Performans B3)
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers (G5/G6)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Astro static routing için try_files
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # /health Endpoint (G6)
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"UP", "service":"portfolio", "message":"OK"}';
    }

    # Hata sayfaları
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
